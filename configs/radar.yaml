# Radar model + training config. See ML_Proj_Vault/modalities/radar.md.
# Hyperparams not in the paper are documented defaults (open-questions.md).

model:
  in_channels: 8
  horizon: 1              # t+1 only (must match data.yaml window.K)
  lstm_hidden: 64
  fc_hidden: 64
  dropout: 0.3
  conv_channels: [32, 64, 128]   # 8 -> 32 -> 64 -> 128

train:
  epochs: 30
  batch_size: 32            # GPU: raise to 32-64
  lr: 1.0e-3                # single LR (no pretrained backbone)
  weight_decay: 1.0e-4
  alpha: 0.367            # 1/3 of original 1.1 (pos_weight ~5)
  num_workers: 8           # persistent_workers OFF so max 8 alive at once (~8GB). Drop to 4/2/0 if
                           #   "paging file too small" recurs.
  amp: false              # mixed precision OFF -> plain fp32 (no fp16 overflow risk); slower on GPU
  early_stop_patience: 7
  seed: 42
  radar_noise_sigma: 0.01  # train-time Gaussian noise on raw cube (paper §III-A1)

norm:
  path: outputs/radar_norm.npz   # train-set per-channel stats (run scripts.fit_radar_norm first)
  fit_samples: 800               # frames sampled to fit stats (all blocked + random clear)
