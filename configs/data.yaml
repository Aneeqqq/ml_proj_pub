# Data pipeline config - MULTI-SCENARIO (DeepSense 31-34).
# See ML_Proj_Vault/dataset/{sequences-and-batching,blockage-label,multi-scenario}.md

paths:
  # Combined dataset built by scripts.build_dataset (scenario, seq_uid, full paths, label_derived).
  csv: data/dataset_all.csv
  # All paths in the combined CSV are relative to ML_Proj_Claude/, so data_root is the project root.
  data_root: .

# Source scenarios: each CSV's "./unit1/..." paths are relative to its own `root`.
scenarios:
  - {name: "31", csv: scenario31_new/scenario31/scenario31_dev_labelled.csv, root: scenario31_new/scenario31}
  - {name: "32", csv: scenario32/scenario32_dev.csv,                          root: scenario32}
  - {name: "33", csv: scenario33/scenario33_dev.csv,                          root: scenario33}
  - {name: "34", csv: scenario34_new/scenario34/scenario34.csv,               root: scenario34_new/scenario34}

window:
  W: 5
  K: 1            # predict ONLY t+1 (0.3 s ahead). Model horizon must match (configs/*.yaml).
  step_ms: 300
  tol_ms: 130

split:
  protocol: pooled           # cross_scenario | pooled  (pooled = paper-style, each scene seen in train)
  test_scenarios: ["31"]     # held-out unseen scenario(s) -> test (cross_scenario only)
  val_frac: 0.18             # fraction of train/val SEQUENCES (from 32/33/34) used for val
  ratios: {train: 0.70, val: 0.15, test: 0.15}   # only used if protocol == pooled
  seed: 42

seq_col: seq_uid             # scenario-qualified sequence id (e.g. "32:5")

# Each run's models/results go to outputs/<run_name>/ so experiments don't overwrite each other.
# Override per experiment via `python -m scripts.train_camera --run-name <name>`.
run_name: pooled_v2_resnet

camera:
  image_size: 256
  norm_mean: [0.485, 0.456, 0.406]
  norm_std:  [0.229, 0.224, 0.225]

radar:
  range_bins: 256
  doppler_out: 64
  n_features: 8

label:
  column: label_derived
  positive: blocked
  negative: not_blocked
  # power-derived label params (LOS-envelope fade) - applied per sequence, per scenario.
  env_win: 41
  env_q: 0.90
  thr_db: -3.0
  min_dur: 3
  deep_db: -4.5
