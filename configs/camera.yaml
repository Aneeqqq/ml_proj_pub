# Camera model + training config. Hyperparams not stated in the paper are sane defaults
# (flagged in ML_Proj_Vault/plan/open-questions.md). See modalities/camera.md.

model:
  horizon: 1              # t+1 only (must match data.yaml window.K)
  lstm_hidden: 128
  fc_hidden: 128
  dropout: 0.4
  pretrained: true        # ResNet-18 ImageNet weights (downloaded on first run)
  freeze_backbone: false  # UNFROZEN: fine-tune the whole ResNet-18 (vs frozen baseline AUC 0.68).

train:
  epochs: 30
  batch_size: 32           # GPU: raise to 32-64
  backbone_lr: 1.0e-4     # lower LR for pretrained backbone
  head_lr: 1.0e-3         # higher LR for LSTM + head
  weight_decay: 1.0e-4
  alpha: 0.367            # 1/3 of original 1.1 (pos_weight ~5)
  num_workers: 4          # train workers persist (below); val/test spawn transiently
  persistent_workers: true  # keep TRAIN workers alive across epochs (no per-epoch torch re-import)
                          #   "paging file too small" recurs.
  amp: true               # AMP back ON (radar clip-safe now) -> ~2x faster on GPU
  early_stop_patience: 7  # epochs without val f1_mean improvement
  seed: 42
